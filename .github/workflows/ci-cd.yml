name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GCP_PROJECT_ID: youtube-uploader-499603
  GCP_REGION: northamerica-northeast2
  CLOUD_RUN_SERVICE: music-assembly-api
  CLOUD_RUN_ASSEMBLE_JOB: music-assemble
  CLOUD_RUN_EXTEND_JOB: music-extend
  ARTIFACT_REPO: music-assembler
  # Wall-clock encode budget for long mixes (target up to 300 min / 5 h).
  ASSEMBLE_TASK_TIMEOUT_SEC: "28800"
  # Gemini extend budget (matches deploy/cloud-run-job.md).
  EXTEND_TASK_TIMEOUT_SEC: "3600"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # API + unit-test surface only (skip rembg/onnxruntime — not needed for pytest).
          pip install \
            pytest \
            "fastapi>=0.115.0" \
            "python-multipart>=0.0.9" \
            "uvicorn[standard]>=0.32.0" \
            "google-cloud-run>=0.10.0" \
            "boto3>=1.28.0" \
            "python-dotenv>=0.0.0" \
            "Pillow>=10.0.0" \
            "openai>=1.0.0" \
            "google-genai>=1.0.0"
          pip install --no-deps .

      - name: Run tests
        run: pytest -q

  deploy:
    name: Deploy dashboard
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 40

      - name: Write deploy manifest
        run: |
          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/write_deploy_manifest.py --ref main --limit 30
          echo "DEPLOYED_AT=${DEPLOYED_AT}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push API image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # Job-level env cannot reference ${{ env.* }}; build the image path here.
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/music-assembly-api"
          IMAGE_TAGGED="${IMAGE}:${SHORT_SHA}"

          # Async + poll: deploy SA often cannot stream default Cloud Build logs,
          # which makes a successful `gcloud builds submit` exit non-zero.
          BUILD_ID="$(gcloud builds submit \
            --config=cloudbuild.api.yaml \
            --substitutions="_IMAGE=${IMAGE_TAGGED}" \
            --async \
            --format='value(id)' \
            .)"
          echo "Cloud Build id: ${BUILD_ID}"
          for _ in $(seq 1 90); do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
            echo "status=${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                gcloud builds describe "${BUILD_ID}" --format='yaml(status,failureInfo,logUrl)'
                exit 1
                ;;
            esac
            sleep 10
          done
          STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
          if [[ "${STATUS}" != "SUCCESS" ]]; then
            echo "Build did not succeed: ${STATUS}"
            exit 1
          fi

          # Also keep :latest for manual / docs commands (best-effort; SHA tag is authoritative).
          gcloud artifacts docker tags add "${IMAGE_TAGGED}" "${IMAGE}:latest" \
            || echo "::warning::Could not move :latest tag (continuing with ${IMAGE_TAGGED})"

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_TAGGED=${IMAGE_TAGGED}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image="${IMAGE_TAGGED}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --quiet \
            --update-env-vars="ASSEMBLY_BUILD_ID=${SHORT_SHA},ASSEMBLY_DEPLOYED_AT=${DEPLOYED_AT}"

      - name: Build and push assemble worker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/music-assemble"
          IMAGE_TAGGED="${IMAGE}:${SHORT_SHA}"

          BUILD_ID="$(gcloud builds submit \
            --config=cloudbuild.assemble.yaml \
            --substitutions="_IMAGE=${IMAGE_TAGGED}" \
            --async \
            --format='value(id)' \
            .)"
          echo "Assemble Cloud Build id: ${BUILD_ID}"
          for _ in $(seq 1 120); do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
            echo "status=${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                gcloud builds describe "${BUILD_ID}" --format='yaml(status,failureInfo,logUrl)'
                exit 1
                ;;
            esac
            sleep 10
          done
          STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
          if [[ "${STATUS}" != "SUCCESS" ]]; then
            echo "Assemble build did not succeed: ${STATUS}"
            exit 1
          fi

          gcloud artifacts docker tags add "${IMAGE_TAGGED}" "${IMAGE}:latest" \
            || echo "::warning::Could not move music-assemble :latest (continuing with ${IMAGE_TAGGED})"

          echo "ASSEMBLE_IMAGE_TAGGED=${IMAGE_TAGGED}" >> "$GITHUB_ENV"

      - name: Update music-assemble Cloud Run Job
        run: |
          gcloud run jobs update "${{ env.CLOUD_RUN_ASSEMBLE_JOB }}" \
            --image="${ASSEMBLE_IMAGE_TAGGED}" \
            --region="${{ env.GCP_REGION }}" \
            --task-timeout="${{ env.ASSEMBLE_TASK_TIMEOUT_SEC }}" \
            --quiet

      - name: Build and push extend worker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/music-extend"
          IMAGE_TAGGED="${IMAGE}:${SHORT_SHA}"

          BUILD_ID="$(gcloud builds submit \
            --config=cloudbuild.extend.yaml \
            --substitutions="_IMAGE=${IMAGE_TAGGED}" \
            --async \
            --format='value(id)' \
            .)"
          echo "Extend Cloud Build id: ${BUILD_ID}"
          for _ in $(seq 1 90); do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
            echo "status=${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                gcloud builds describe "${BUILD_ID}" --format='yaml(status,failureInfo,logUrl)'
                exit 1
                ;;
            esac
            sleep 10
          done
          STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
          if [[ "${STATUS}" != "SUCCESS" ]]; then
            echo "Extend build did not succeed: ${STATUS}"
            exit 1
          fi

          gcloud artifacts docker tags add "${IMAGE_TAGGED}" "${IMAGE}:latest" \
            || echo "::warning::Could not move music-extend :latest (continuing with ${IMAGE_TAGGED})"

          echo "EXTEND_IMAGE_TAGGED=${IMAGE_TAGGED}" >> "$GITHUB_ENV"

      - name: Update music-extend Cloud Run Job
        run: |
          gcloud run jobs update "${{ env.CLOUD_RUN_EXTEND_JOB }}" \
            --image="${EXTEND_IMAGE_TAGGED}" \
            --region="${{ env.GCP_REGION }}" \
            --task-timeout="${{ env.EXTEND_TASK_TIMEOUT_SEC }}" \
            --quiet

      - name: Smoke check
        run: |
          URL="$(gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')"
          echo "Service URL: ${URL}"
          curl -fsS --retry 5 --retry-delay 3 "${URL}/health"
          echo
          curl -fsS "${URL}/v1/version" || true
          echo
          curl -fsS "${URL}/v1/updates" || true
          echo
          echo "Deployed API ${SHORT_SHA} → ${URL}"
          echo "Updated job ${{ env.CLOUD_RUN_ASSEMBLE_JOB }} → ${ASSEMBLE_IMAGE_TAGGED}"
          echo "Updated job ${{ env.CLOUD_RUN_EXTEND_JOB }} → ${EXTEND_IMAGE_TAGGED}"
